# Render Blueprint for Terminas (Cloud IDE)
# Docs: https://render.com/docs/blueprint-spec
#
# Provisions three services:
#   - cloud-ide-redis     : Redis (Key Value) for caching
#   - cloud-ide-backend   : Node/Express API (web service)
#   - cloud-ide-frontend  : Vite/React static site
#
# Values marked `sync: false` must be filled in the Render dashboard after the
# first deploy (Atlas URI, mail password, and the two cross-service URLs).
# See the NOTES at the bottom of this file.

services:
  # --------------------------------------------------------- Redis (Key Value)
  - type: redis
    name: cloud-ide-redis
    plan: free
    ipAllowList: []          # empty = reachable only from your Render services
    maxmemoryPolicy: allkeys-lru

  # ------------------------------------------------------------------ Backend
  - type: web
    name: cloud-ide-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: node app.js
    healthCheckPath: /api-docs
    envVars:
      - key: CONNECTION_STR    # MongoDB Atlas URI (set in dashboard)
        sync: false
      - key: JWT_SECRET        # auto-generated strong secret
        generateValue: true
      - key: NODEMAILER_PASS   # Gmail App Password (optional; set in dashboard)
        sync: false
      - key: DEPLOY_URL        # this service's own public URL (set after 1st deploy)
        sync: false
      - key: REDIS_URL         # wired automatically from the Key Value instance
        fromService:
          name: cloud-ide-redis
          type: redis
          property: connectionString

  # ----------------------------------------------------------------- Frontend
  - type: web
    name: cloud-ide-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite          # SPA fallback so client-side routes don't 404
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL      # backend public URL (set after 1st deploy)
        sync: false

# ----------------------------------------------------------------------- NOTES
# 1. Atlas Network Access: allow 0.0.0.0/0 (or Render's outbound IPs) so the
#    backend can reach your cluster.
# 2. After the first deploy, copy each service's URL and set:
#       backend  DEPLOY_URL    = https://cloud-ide-backend.onrender.com
#       frontend VITE_API_URL  = https://cloud-ide-backend.onrender.com
#    Then trigger a frontend redeploy (VITE_ vars are baked in at build time).
# 3. The in-app Docker container feature (dockerode -> local Docker socket) will
#    NOT work on Render — there is no Docker daemon inside a web service. Auth,
#    templates, analytics, etc. work; live container/terminal creation does not.
